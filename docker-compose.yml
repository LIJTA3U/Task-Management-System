services:
  db:
    image: postgres:16
    container_name: task_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: task_management_system
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: task_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: task_management_system
      DB_PASSWORD: root
      DB_PORT: 5432
      JWT_SECRET: your_secret_key_here
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ./backend/logs:/app/logs  

  frontend:
    build: ./frontend
    container_name: task_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata: