<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <a href="index.html" class="back-link">← На главную</a>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🔐</div>
                <h1>Вход в систему</h1>
                <p>Войди в личный кабинет, чтобы управлять задачами</p>
            </div>

            <form id="loginForm" class="auth-form">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" type="email" name="email" placeholder="example@yandex.ru" required>

                <label for="loginPassword">Пароль</label>
                <input id="loginPassword" type="password" name="password" placeholder="Введите пароль" required>

                <button type="submit" class="btn btn-full">Войти</button>
            </form>

            <div class="auth-footer">
                <span>Нет аккаунта?</span>
                <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
